<!-- Sticky TOC sidebar -->
<div class="filter_bar bg-primary" [class.collapsed]="isCollapsed()">
  <div class="toc_shell">
    <div class="top overflow-hidden bg-secondary">
      <div class="top_label" [class.top_label_hidden]="isCollapsed()">
        Benchmarks
      </div>
      <button
        type="button"
        class="sidebar_toggle"
        (click)="toggleCollapse()"
        [attr.aria-expanded]="!isCollapsed()"
        [attr.aria-label]="
          isCollapsed()
            ? 'Expand benchmark sidebar'
            : 'Collapse benchmark sidebar'
        "
      >
        <app-icon
          [name]="isCollapsed() ? 'chevron-right' : 'chevron-left'"
          iconClass="h-5 w-5"
          class="text-emerald-400"
        />
      </button>
    </div>

    <div class="toc_panel_body overflow-hidden bg-secondary">
      <!-- TOC navigation -->
      <nav
        class="toc_nav px-2 pb-3 overflow-y-auto"
        [class.toc_nav_mini]="isCollapsed()"
        aria-label="Benchmark workloads table of contents"
      >
        @for (family of familiesWithState(); track family.framework) {
          <div
            class="sidebar_family_row mx-2 p-3 border-b border-gray-200"
            [class.sidebar_family_row_mini]="isCollapsed()"
          >
            <!-- Family accordion header -->
            <button
              class="toc_family_btn w-full"
              [class.active]="family.isHighlighted"
              [class.toc_family_btn_mini]="isCollapsed()"
              (click)="handleFamilyClick(family.framework)"
              (mouseenter)="showSidebarTooltip($event, family.framework)"
              (mouseleave)="hideSidebarTooltip()"
              (focus)="showSidebarTooltip($event, family.framework)"
              (blur)="hideSidebarTooltip()"
            >
              <span
                class="toc_family_info"
                [class.toc_family_info_mini]="isCollapsed()"
              >
                <app-icon
                  [name]="family.framework | benchmarkIcon"
                  iconClass="h-4 w-4"
                />
                <span
                  class="toc_family_name"
                  [class.toc_family_name_hidden]="isCollapsed()"
                  >{{ family.framework }}</span
                >
              </span>
              <app-icon
                [name]="family.isExpanded ? 'chevron-down' : 'chevron-right'"
                iconClass="h-4 w-4"
                class="toc_family_chevron shrink-0"
              />
            </button>

            <!-- Family sub-items -->
            @if (!isCollapsed() && family.isExpanded) {
              <div class="toc_family_items mb-3 flex flex-col gap-0.5">
                @for (bm of family.benchmarks; track bm.benchmark_id) {
                  <button
                    class="toc_item w-full text-left px-2 py-1.5 rounded text-xs transition-colors"
                    [class.active]="activeBenchmarkId() === bm.benchmark_id"
                    (click)="scrollTo(bm.benchmark_id)"
                  >
                    {{ bm.name }}
                  </button>
                }
              </div>
            }
          </div>
        }
      </nav>
    </div>
  </div>
</div>

<div
  #tooltipEl
  style="opacity: 0; display: none"
  class="tooltip-panel fixed z-100 pointer-events-none max-w-48"
>
  {{ tooltipContent() }}
</div>
