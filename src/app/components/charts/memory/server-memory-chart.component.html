@if (chartData() && currentMemoryChartOption()) {
  <div class="block_half" id="bw_mem_chart">
    <div
      class="flex flex-col items-start gap-4 md:flex-row md:items-center md:justify-between"
    >
      <h3 class="text-2xl flex items-center gap-2">
        <svg [lucideIcon]="'bwmem' | benchmarkIcon" class="h-6 w-6"></svg>
        <span class="whitespace-nowrap">Memory Bandwidth</span>
        <svg
          [lucideIcon]="currentMemoryChartIcon()"
          class="h-4 w-4 text-gray-200"
          (mouseenter)="showTooltip($event, currentMemoryChartOrderTooltip())"
          (mouseleave)="hideTooltip()"
        ></svg>
        <svg
          lucideInfo
          class="h-4 w-4 text-gray-200"
          (mouseenter)="showTooltip($event, currentMemoryChartInfo())"
          (mouseleave)="hideTooltip()"
        ></svg>
      </h3>
      <button
        #memoryDropdown="appFlowbiteDropdown"
        [id]="buttonId"
        class="dropdown_button chart-selector-button chart-selector-button--responsive"
        type="button"
        [appFlowbiteDropdown]="optionsId"
        [dropdownEnabled]="
          isBrowser && availableMemoryChartOptions().length > 0
        "
      >
        <div class="chart-selector-button__label">
          {{ currentMemoryChartOption().name }}
        </div>
        <div class="chart-selector-button__icon">
          <svg
            lucideChevronDown
            class="h-6 w-6 shrink-0 text-emerald-400"
          ></svg>
        </div>
      </button>
    </div>
    @if (isBrowser) {
      <div class="h-full">
        <div class="chart_div" chartType="bar">
          <canvas
            id="bw_mem_canvas"
            baseChart
            [data]="chartData()"
            [options]="chartOptions()"
            [type]="lineChartType"
          >
          </canvas>
        </div>
      </div>
    }
  </div>

  <div
    [id]="optionsId"
    class="z-10 hidden w-max min-w-64 max-w-[calc(100vw-2rem)] bg-secondary rounded-lg border border-emerald-400 border-solid shadow"
  >
    <ul
      class="py-2 px-1 text-sm text-gray-700"
      [attr.aria-labelledby]="buttonId"
    >
      @for (
        memoryOption of availableMemoryChartOptions();
        track memoryOption.id
      ) {
        <li>
          <button
            type="button"
            class="w-full flex py-1 px-2 gap-2 items-center cursor-pointer hover:bg-emerald-500 rounded-sm border-0 bg-transparent text-left"
            (click)="selectMemoryChartOption(memoryOption)"
            [title]="memoryOption.name"
          >
            <div class="text-white text-sm">{{ memoryOption.name }}</div>
          </button>
        </li>
      }
    </ul>
  </div>

  <div
    id="tooltipDefault"
    #tooltipDefault
    style="opacity: 0; display: none"
    class="tooltip-panel fixed z-100 pointer-events-none"
  >
    {{ tooltipContent() }}
  </div>
}
