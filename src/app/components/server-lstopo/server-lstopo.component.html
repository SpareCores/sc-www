<div class="flex justify-between items-center mb-4 gap-8">
  <h3 class="text-2xl">CPU and System Topology</h3>
  @if (svgImgUrl && lstopoUrl) {
    <button
      class="btn-primary py-2 px-3 flex gap-2 h-[42px]"
      aria-haspopup="dialog"
      aria-controls="lstopo-modal"
      (click)="openLstopoModal()"
    >
      <span>Open fullscreen</span>
      <lucide-icon name="maximize-2" class="h-6 w-6"></lucide-icon>
    </button>
  }
</div>

@if (isLoading) {
  <div class="flex justify-center items-center py-16">
    <svg
      aria-hidden="true"
      class="inline animate-spin fill-emerald-400 w-12 h-12 text-gray-200"
      viewBox="0 0 100 101"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z"
        fill="currentColor"
      />
      <path
        d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z"
        fill="currentFill"
      />
    </svg>
  </div>
}

@if (svgImgUrl && lstopoUrl) {
  <div class="lstopo-img-wrapper">
    <img class="lstopo-img" [src]="svgImgUrl" alt="CPU and System Topology" />
    @if (tooltipSvg) {
      <div class="lstopo-tooltip-overlay" [innerHTML]="tooltipSvg"></div>
    }
  </div>

  <div
    #lstopoModal
    id="lstopo-modal"
    tabindex="-1"
    class="lstopo-modal-wrapper fixed top-0 left-0 right-0 z-50 hidden w-full p-4 overflow-x-hidden overflow-y-auto md:inset-0 h-[calc(100%-1rem)] max-h-full"
  >
    <div class="relative w-fit max-w-[87.5rem] mx-auto my-auto">
      <div
        class="relative bg-secondary rounded-lg shadow border border-solid border-emerald-400"
      >
        <div
          class="flex items-center justify-between p-4 border-b border-gray-600"
        >
          <h3 class="text-xl font-medium text-white">
            CPU and System Topology
          </h3>
          <button
            type="button"
            class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center"
            (click)="closeLstopoModal()"
          >
            <svg
              class="w-3 h-3"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 100 100"
              preserveAspectRatio="xMidYMid meet"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"
              />
            </svg>

            <span class="sr-only">Close modal</span>
          </button>
        </div>
        <div class="lstopo-modal-body overflow-auto max-h-[80vh]" appDragToPan>
          <div
            class="lstopo-container lstopo-modal-svg"
            [innerHTML]="modalSvg"
          ></div>
        </div>
      </div>
    </div>
  </div>
}

<div
  #lstopoTooltip
  style="opacity: 0; display: none"
  class="fixed z-[200] inline-block px-3 py-2 text-sm font-medium text-white transition-opacity duration-300 bg-secondary border border-solid border-emerald-400 rounded-lg pointer-events-none max-w-xs"
>
  {{ tooltipContent }}
</div>
