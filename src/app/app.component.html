<div class="app-shell">
  @if (showHomeAnnouncement || showHeader) {
    <div class="app-shell-chrome">
      @if (showHomeAnnouncement) {
        <app-announcement-ticker
          [message]="homeAnnouncement"
          [dismissible]="true"
          (dismissed)="dismissHomeAnnouncement()"
        ></app-announcement-ticker>
      }
      @if (showHeader) {
        <header>
          <app-header></app-header>
        </header>
      }
    </div>
  }
  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
  @if (showFooter) {
    <footer>
      <app-footer></app-footer>
    </footer>
  }
</div>
