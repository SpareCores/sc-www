<div class="app-shell">
  @if (showHeader || promoBannerMessage) {
    <div class="app-shell-chrome">
      @if (showHeader) {
        <header>
          <app-header></app-header>
        </header>
      }
      @if (promoBannerMessage; as bannerMessage) {
        <div class="app-shell-banner">
          <div class="content">
            <app-promo-banner
              [message]="bannerMessage"
              [dismissible]="true"
              (dismissed)="dismissPromoBanner()"
            ></app-promo-banner>
          </div>
        </div>
      }
    </div>
  }
  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
  @if (showFooter) {
    <footer>
      <app-footer></app-footer>
    </footer>
  }
</div>
